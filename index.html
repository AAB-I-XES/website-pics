<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Page Image</title>

<style>
    body, html{
        margin: 0;
        padding: 0;
        height: 100%;
    }

    .full-image{
        width: 100%;
        height: 100vh;
        object-fit: cover;
        display: block;
    }
</style>

</head>

<body>

<img src="your-image.jpg" class="full-image" alt="Full Image">

</body>
</html>
